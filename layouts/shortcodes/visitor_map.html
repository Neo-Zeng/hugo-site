{{- $widgetID := .Get "id" -}}
<div class="visitor-map-frame" aria-label="World map showing aggregated visitor locations and total visits">
  <div class="visitor-map-fallback" role="img" aria-label="World map placeholder shown while the live visitor map is unavailable"></div>
  {{- with $widgetID }}
  <script
    type="text/javascript"
    id="mapmyvisitors"
    src="https://mapmyvisitors.com/map.js?d={{ . }}&amp;cl=102033&amp;w=a&amp;x=y">
  </script>
  {{- end }}
</div>
